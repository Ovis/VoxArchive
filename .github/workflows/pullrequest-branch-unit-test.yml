name: PullRequest Branch UnitTest

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - feature/*
      - hotfix/*
      - release/*

jobs:
  pullrequest-branch-unittest:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build the project
        run: dotnet build VoxArchive.slnx --configuration Release

      - name: Test VoxArchive
        run: dotnet test tests/VoxArchive.IntegrationTests/VoxArchive.IntegrationTests.csproj --configuration Release --verbosity normal
